services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_AUTO_CREATE_DB: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: oficina_estoque
      DB_USERNAME: oficina
      DB_PASSWORD: oficina
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oficina_estoque
      MYSQL_USER: oficina
      MYSQL_PASSWORD: oficina
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
